services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfoodfacts-kmeans-app
    network_mode: host
    environment:
      MSSQL_HOST: localhost
      MSSQL_PASSWORD: ${MSSQL_PASSWORD:-QwErTy123@!}
    volumes:
      - ./data:/app/data
    depends_on:
      mssql:
        condition: service_healthy

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: openfoodfacts-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD:-QwErTy123@!}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mssql_data:
